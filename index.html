  <!-- SENSOR NAZA PORTAL - AUDITORIA (CORRIGIDO) -->
<script>
(function(){
  // Aguarda o Firebase estar disponível
  function initSensorAuditoria() {
    // Verifica se o Firebase SDK existe
    if (typeof firebase === 'undefined') {
      console.warn('⏳ Sensor Auditoria: Firebase SDK não carregado, aguardando...');
      setTimeout(initSensorAuditoria, 1000);
      return;
    }

    const sensorFirebaseConfig = {
      apiKey: "AIzaSyDneReMjO78JqJ-LvmSTiQqUMkxT97H6JE",
      authDomain: "naza-auditoria-hub.firebaseapp.com",
      databaseURL: "https://naza-auditoria-hub-default-rtdb.firebaseio.com",
      projectId: "naza-auditoria-hub"
    };

    const SENSOR_APP_NAME = 'sensorPortalAuditoria';
    let sensorApp = null;

    try {
      // Verifica se já existe uma app com esse nome
      sensorApp = firebase.apps.find(app => app.name === SENSOR_APP_NAME);
      
      if (!sensorApp) {
        // Cria nova instância apenas se não existir
        sensorApp = firebase.initializeApp(sensorFirebaseConfig, SENSOR_APP_NAME);
        console.log('✅ Sensor Auditoria: App inicializada');
      } else {
        console.log('✅ Sensor Auditoria: App já existente');
      }
    } catch (e) {
      console.error('❌ Falha ao iniciar app do sensor Auditoria:', e);
      return;
    }

    let db = null;
    try {
      db = sensorApp.database();
      console.log('✅ Sensor Auditoria: Database conectado');
    } catch (e) {
      console.error('❌ Falha ao conectar Realtime Database da Auditoria:', e);
      return;
    }

    const SISTEMA_ID = 'auditoria';

    function extrairNumero(elementoId) {
      const el = document.getElementById(elementoId);
      if (!el) return 0;
      
      const texto = el.textContent || '';
      // Remove pontos de milhar e substitui vírgula por ponto para decimal
      const numeroStr = texto.replace(/\./g, '').replace(',', '.').replace('%', '');
      const match = numeroStr.match(/-?\d+(?:\.\d+)?/);
      return match ? parseFloat(match[0]) : 0;
    }

    function coletarDadosAuditoria() {
      try {
        // Tenta ler dos elementos HTML (que existem na página)
        let total = extrairNumero('kTotal');
        let revisar = extrairNumero('kRev');
        let semJustificativa = extrairNumero('kSemJ');
        let percRevisarTexto = document.getElementById('kPerc')?.textContent || '0%';
        let percRevisar = parseFloat(percRevisarTexto.replace('%', '')) || 0;

        // Se não conseguiu dos elementos, tenta das variáveis globais
        if (total === 0 && typeof VIEW !== 'undefined' && VIEW) {
          total = VIEW.length;
          revisar = VIEW.filter(r => r && r.Status === 'REVISAR').length;
          semJustificativa = VIEW.filter(r => r && r._missingJust).length;
          percRevisar = total > 0 ? (revisar / total) * 100 : 0;
        }

        // Fallback final: variáveis RAW
        if (total === 0 && typeof RAW !== 'undefined' && RAW) {
          total = RAW.length;
          revisar = RAW.filter(r => r && r.Status === 'REVISAR').length;
          semJustificativa = RAW.filter(r => r && r._missingJust).length;
          percRevisar = total > 0 ? (revisar / total) * 100 : 0;
        }

        const payload = {
          sistema: SISTEMA_ID,
          valores: [
            Number(percRevisar.toFixed(1)),
            total || 0,
            revisar || 0,
            semJustificativa || 0
          ],
          dadosCompletos: {
            total: total || 0,
            revisar: revisar || 0,
            semJustificativa: semJustificativa || 0,
            percRevisar: Number(percRevisar.toFixed(1)),
            timestamp: Date.now(),
            dataHora: new Date().toLocaleString('pt-BR')
          },
          timestamp: Date.now()
        };

        return payload;
      } catch (e) {
        console.warn('❌ Erro ao coletar dados da auditoria:', e);
        return {
          sistema: SISTEMA_ID,
          valores: [0, 0, 0, 0],
          dadosCompletos: {
            total: 0,
            revisar: 0,
            semJustificativa: 0,
            percRevisar: 0,
            timestamp: Date.now()
          },
          timestamp: Date.now()
        };
      }
    }

    function enviarDadosAuditoria() {
      const payload = coletarDadosAuditoria();
      
      db.ref('sensores/' + SISTEMA_ID)
        .set(payload)
        .then(() => {
          console.log('🟢 Sensor Auditoria ativo', {
            perc: payload.valores[0] + '%',
            total: payload.valores[1],
            revisar: payload.valores[2],
            semJust: payload.valores[3]
          });
        })
        .catch((err) => console.error('❌ Erro ao enviar sensor Auditoria:', err));
    }

    // Primeiro envio após 4 segundos (dá tempo da página carregar)
    setTimeout(enviarDadosAuditoria, 4000);
    
    // Atualiza a cada 30 segundos
    setInterval(enviarDadosAuditoria, 30000);
    
    console.log('🟢 Sensor Auditoria iniciado com sucesso');
  }

  // Inicia o sensor quando o DOM estiver pronto
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initSensorAuditoria);
  } else {
    // Se o DOM já carregou, inicia imediatamente
    initSensorAuditoria();
  }
})();
</script>
